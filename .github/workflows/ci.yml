name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🔐 Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 🐳 Build Backend
      - name: Build backend image
        run: docker build -t backend ./backend

      # 🐳 Tag Backend
      - name: Tag backend image
        run: docker tag backend:latest 630777583538.dkr.ecr.us-east-1.amazonaws.com/backend-repo:latest

      # 🚀 Push Backend
      - name: Push backend image
        run: docker push 630777583538.dkr.ecr.us-east-1.amazonaws.com/backend-repo:latest

      # 🐳 Build Frontend
      - name: Build frontend image
        run: docker build -t frontend ./frontend

      # 🐳 Tag Frontend
      - name: Tag frontend image
        run: docker tag frontend:latest 630777583538.dkr.ecr.us-east-1.amazonaws.com/frontend-repo:latest

      # 🚀 Push Frontend
      - name: Push frontend image
        run: docker push 630777583538.dkr.ecr.us-east-1.amazonaws.com/frontend-repo:latest
